name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brokeruser
          POSTGRES_PASSWORD: brokerpass
          POSTGRES_DB: brokerdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brokeruser -d brokerdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://brokeruser:brokerpass@localhost:5432/brokerdb
      # Tests run as ENVIRONMENT=development (default) + explicit AUTH_DISABLED.
      # Production safety: api/auth.py::_is_auth_disabled refuses to honor
      # AUTH_DISABLED when ENVIRONMENT=production. See test_auth_safety.py.
      AUTH_DISABLED: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit + integration tests
        # --cov-fail-under is the floor against regression. Today's number
        # is ~59%; we set the gate at 55 so natural fluctuation doesn't
        # break the build, but a meaningful drop will. Raise this whenever
        # you intentionally bump coverage in a PR. Don't lower it.
        run: |
          uv run python -m pytest tests/unit tests/integration -v --tb=short \
            --cov=api --cov-report=term --cov-fail-under=55

      - name: Lint
        run: |
          uv run pylint api/ \
            --fail-under=8 \
            --disable=C0114,C0115,C0116,R0903,W0611

      - name: Dead-import sweep (ruff F401)
        # Pylint W0611 is disabled above (too noisy with dynamic imports);
        # ruff F401 is faster and more precise. Ran via uvx so we don't add
        # ruff to project deps — the external Antire reusable-ruff job already
        # owns the broader formatting check.
        run: uvx ruff check --select F401 api/ tests/ scripts/

      - name: Complexity report (informational)
        run: uv run radon cc api/ -n C -s || true

  # Inlined ruff check (was Antire-AS/antire-reusable-actions@v0.18.0 but its
  # setup-deploy-key step fails on repos without a DEPLOY_KEY secret —
  # ssh-add stdin is empty, libcrypto bombs, exit 1). This local version does
  # what we actually need without the SSH indirection.
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run ruff check
        run: uvx ruff check api/ tests/ scripts/

  # Inlined pyright type check — same reasoning as ruff above.
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install project deps (so pyright can resolve imports)
        run: uv sync --frozen

      - name: Run pyright
        run: uv run --with pyright pyright
        # Reads pyrightconfig.json from repo root. SQLAlchemy 1.x Column[X]
        # type categories are downgraded to warnings — until we migrate to
        # SQLAlchemy 2.0 Mapped[] types they're >90% false positives. Real
        # bugs in other categories still fail the build.

  duplication:
    uses: Antire-AS/antire-reusable-actions/.github/workflows/reusable-duplicate-code-detection.yml@v0.18.0
    with:
      ignore-patterns: "**/__pycache__/**,**/.venv/**,**/node_modules/**,**/.git/**,uv.lock"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check and build
        run: npm run build

  api-types-fresh:
    # Verifies that frontend/src/lib/api-schema.ts is in sync with the FastAPI
    # OpenAPI schema. If a backend change renames a field but the developer
    # forgot to run `npm run gen:api-types`, this job fails the PR with a diff
    # showing exactly what would change. This is the safety net for the silent
    # field-name bug class (see api/schemas.py header comments).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python deps
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Regenerate API types from current backend
        working-directory: frontend
        run: npm run gen:api-types

      - name: Check for dead client functions
        # Reuses the loaded FastAPI app to verify every apiFetch URL in
        # frontend/src/lib/api.ts maps to a backend route. Catches the
        # `getPortfolioOverview` / `getRiskNarrative` class of bugs.
        env:
          AUTH_DISABLED: "1"
        run: uv run python scripts/check_dead_client_fns.py

      - name: Verify api-schema.ts is up to date
        run: |
          schema=frontend/src/lib/api-schema.ts
          # Catch the "file is untracked / never committed" case as well as drift.
          if [ ! -f "$schema" ]; then
            echo "::error::$schema does not exist after codegen — something is broken in scripts/dump_openapi.py."
            exit 1
          fi
          if ! git ls-files --error-unmatch "$schema" >/dev/null 2>&1; then
            echo "::error::$schema exists but is not tracked by git. Add it: git add $schema && commit."
            exit 1
          fi
          if ! git diff --exit-code -- "$schema"; then
            echo ""
            echo "::error::$schema is out of sync with the FastAPI OpenAPI schema."
            echo "::error::A backend response model was renamed or added but the generated TS types weren't updated."
            echo "::error::Fix: cd frontend && npm run gen:api-types && git add $schema && commit."
            exit 1
          fi
          echo "OK: api-schema.ts matches the current backend."

  staging-gate:
    # Enforces the team convention that all changes go through staging
    # before reaching main, EXCEPT for low-risk PRs that explicitly opt out
    # via "[skip-staging]" in the title or the "skip-staging" label.
    #
    # Why opt-out instead of opt-in: full staging hops add ~15 min of CI +
    # deploy time per PR. For docs, dependency bumps, single-line fixes,
    # and Dependabot security PRs, that overhead is pure friction. The
    # default still goes through staging — you only see the gate's teeth
    # when you (a) target main directly without coming from staging AND
    # (b) forgot to mark the PR as low-risk.
    #
    # When to use [skip-staging]:
    #   ✓ Docs-only changes (README, CLAUDE.md)
    #   ✓ Dependency bumps from Dependabot or manual security upgrades
    #   ✓ Single-line config fixes (deploy.yml env var add/rename)
    #   ✓ Comment-only edits
    #   ✓ Hotfixes that need to land on prod within minutes (incident response)
    #
    # When NOT to use [skip-staging]:
    #   ✗ Any change to api/services/, api/routers/, frontend/src/
    #   ✗ Any change touching DB schema or migrations
    #   ✗ Any change to LLM provider routing or auth
    #   ✗ Anything that could cause a 5xx if rolled back wrong
    #
    # If you need [skip-staging] often, the change probably wants better
    # test coverage instead — talk to whoever owns the area.
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Check staging gate
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          echo "Base: main"
          echo "Head: $PR_HEAD_REF"
          echo "Title: $PR_TITLE"
          echo "Labels: $PR_LABELS"

          # Coming from staging is the canonical path — always allowed.
          if [[ "$PR_HEAD_REF" == "staging" ]]; then
            echo "✓ PR comes from staging branch — staging gate satisfied"
            exit 0
          fi

          # Otherwise it's a feature/fix/chore branch targeting main directly.
          # Require an explicit opt-out marker.
          if [[ "$PR_TITLE" == *"[skip-staging]"* ]]; then
            echo "✓ PR title contains [skip-staging] — opt-out accepted"
            echo "::notice::This PR bypasses the staging gate. Make sure the change is genuinely low-risk (see staging-gate job in ci.yml for criteria)."
            exit 0
          fi

          if [[ ",$PR_LABELS," == *",skip-staging,"* ]]; then
            echo "✓ PR has skip-staging label — opt-out accepted"
            echo "::notice::This PR bypasses the staging gate via label. Make sure the change is genuinely low-risk."
            exit 0
          fi

          echo "::error::This PR targets main directly but does not come from staging."
          echo "::error::Either:"
          echo "::error::  1. Open a PR from your branch into staging first, merge to staging, then promote staging→main, OR"
          echo "::error::  2. If this is a low-risk change (docs, deps, single-line fix, hotfix), add [skip-staging] to the PR title or apply the 'skip-staging' label."
          echo "::error::See the staging-gate job in .github/workflows/ci.yml for the full criteria."
          exit 1
