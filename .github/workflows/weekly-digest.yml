name: Weekly Portfolio Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:       # Allow manual trigger at any time

permissions:
  id-token: write
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get API URL
        id: api
        run: |
          FQDN=$(az containerapp show \
            --name ca-api \
            --resource-group rg-broker-accelerator-prod \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Send portfolio digest
        run: |
          curl --fail --retry 3 --retry-delay 10 \
            -X POST "${{ steps.api.outputs.url }}/admin/portfolio-digest"
          echo "Portfolio digest sent."
