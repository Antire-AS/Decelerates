name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub OIDC token exchange with Azure
permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-prod-brokeraccelerator
  API_APP_NAME: ca-prod-api
  UI_APP_NAME: ca-prod-ui

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/broker-api:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/broker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/broker-ui:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/broker-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/broker-api:${{ github.sha }}

      - name: Deploy UI to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.UI_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/broker-ui:${{ github.sha }}

      - name: Smoke test — API /ping
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionFqdn" -o tsv)
          curl --fail --retry 5 --retry-delay 5 "https://${API_FQDN}/ping"
