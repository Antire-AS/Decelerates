name: Deploy

on:
  push:
    branches: [main, staging]

# Required for GitHub OIDC token exchange with Azure
permissions:
  id-token: write
  contents: read

env:
  RG: rg-broker-accelerator-prod
  ACR: crantireshared
  LOCATION: norwayeast
  RUNTIME_IDENTITY: /subscriptions/6c73d6c8-9e92-47f0-a3d3-ed681a1209aa/resourceGroups/rg-broker-accelerator-prod/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-runtime-broker-accelerator-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set environment config
        id: config
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            # Real auth: NextAuth (Google + Azure AD) forwards id_token via
            # providers.tsx AuthGate; backend validates per api/auth.py.
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "cae=cae-broker-accelerator-prod" >> $GITHUB_OUTPUT
            echo "api_app=ca-api" >> $GITHUB_OUTPUT
            echo "frontend_app=ca-frontend" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DATABASE_URL }}" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "cae=cae-broker-accelerator-staging" >> $GITHUB_OUTPUT
            echo "api_app=ca-api-staging" >> $GITHUB_OUTPUT
            echo "frontend_app=ca-frontend-staging" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR }}

      - name: Define retry-on-provisioning helper
        # Shared bash function used by every `az containerapp update / az rest PATCH`
        # call in this job. Only retries on ContainerAppOperationInProgress — any
        # other failure fails fast. Concurrent deploys (eg. a [skip-staging]
        # promote landing ~60s after a staging merge) hold a provisioning lock
        # on the container app for up to ~2 min; 6× 20s retries cover that
        # window comfortably.
        run: |
          cat > /tmp/retry-on-provisioning.sh <<'SH'
          retry_on_provisioning() {
            for ATTEMPT in 1 2 3 4 5 6; do
              if "$@" 2>&1 | tee /tmp/retry.log; then
                return 0
              fi
              if ! grep -q "ContainerAppOperationInProgress" /tmp/retry.log; then
                echo "::error::command failed for a non-concurrency reason"
                return 1
              fi
              echo "Concurrent op in progress, retrying in 20s (attempt $ATTEMPT/6)..."
              sleep 20
            done
            echo "::error::Timed out waiting for concurrent container operation"
            return 1
          }
          SH
          chmod +x /tmp/retry-on-provisioning.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-api:${{ steps.config.outputs.env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy API
        env:
          # GitHub Actions handles multiline secrets safely as env vars but
          # NOT as inline ${{ }} interpolation in bash arrays. So bring the
          # SA JSON in via the env: block, then base64-encode it below.
          GCP_VERTEX_AI_SA_JSON_RAW: ${{ secrets.GCP_VERTEX_AI_SA_JSON }}
        run: |
          # Base64-encode the SA JSON so it survives the --env-vars bash
          # array (multiline JSON with quotes/newlines breaks --env-vars).
          # main.py decodes GCP_VERTEX_AI_SA_JSON_B64 back at startup.
          GCP_VERTEX_AI_SA_JSON_B64=$(printf '%s' "$GCP_VERTEX_AI_SA_JSON_RAW" | base64 | tr -d '\n')

          # Shared env-vars block used by both create and update
          ENV_VARS=(
            "ENVIRONMENT=${{ steps.config.outputs.environment }}"
            "DATABASE_URL=${{ steps.config.outputs.db_url }}"
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}"
            "AZURE_FOUNDRY_BASE_URL=${{ secrets.AZURE_FOUNDRY_BASE_URL }}"
            "AZURE_FOUNDRY_API_KEY=${{ secrets.AZURE_FOUNDRY_API_KEY }}"
            "GCP_VERTEX_AI_PROJECT=${{ secrets.GCP_VERTEX_AI_PROJECT }}"
            "GCP_VERTEX_AI_LOCATION=${{ secrets.GCP_VERTEX_AI_LOCATION }}"
            "GCP_VERTEX_AI_SA_JSON_B64=$GCP_VERTEX_AI_SA_JSON_B64"
            "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}"
            "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}"
            "AZURE_OPENAI_CHAT_DEPLOYMENT=gpt-4o"
            "AZURE_BLOB_ENDPOINT=${{ secrets.AZURE_BLOB_ENDPOINT }}"
            "AZURE_SEARCH_ENDPOINT=${{ secrets.AZURE_SEARCH_ENDPOINT }}"
            "AZURE_SEARCH_API_KEY=${{ secrets.AZURE_SEARCH_API_KEY }}"
            "AZURE_SEARCH_INDEX_NAME=company-chunks"
            "AZURE_COMMUNICATION_CONNECTION_STRING=${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}"
            "AZURE_VIDEO_CONTAINER=transksrt"
            "AZURE_CLIENT_ID=b7cb534e-d7a3-4028-8f72-50bfd7f99f2b"
            "AZURE_TENANT_ID=common"
            "AUTH_AUDIENCE=${{ secrets.FRONTEND_AZURE_AD_CLIENT_ID }}"
            "AUTH_ALLOWED_DOMAINS=antire.no"
            "AUTH_ALLOWED_EMAILS=tharu281001@gmail.com"
            "BROKER_FIRM_NAME=${{ secrets.BROKER_FIRM_NAME }}"
            "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"
            "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
            "FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}"
            "SIGNICAT_API_BASE=${{ secrets.SIGNICAT_API_BASE }}"
            "SIGNICAT_CLIENT_ID=${{ secrets.SIGNICAT_CLIENT_ID }}"
            "SIGNICAT_CLIENT_SECRET=${{ secrets.SIGNICAT_CLIENT_SECRET }}"
            "SIGNICAT_WEBHOOK_URL=${{ secrets.SIGNICAT_WEBHOOK_URL }}"
            "ACS_SENDER_ADDRESS=anbud@meglerai.no"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "AUTH_DISABLED=1"
          )

          # Create-or-update: create only runs the first time; update uses
          # the atomic probe+image PATCH below to avoid the probe race.
          if ! az containerapp show --name ${{ steps.config.outputs.api_app }} \
               --resource-group ${{ env.RG }} --query name -o tsv 2>/dev/null; then
            echo "App doesn't exist — creating..."
            az containerapp create \
              --name ${{ steps.config.outputs.api_app }} \
              --resource-group ${{ env.RG }} \
              --environment ${{ steps.config.outputs.cae }} \
              --image ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }} \
              --registry-server ${{ env.ACR }}.azurecr.io \
              --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
              --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --env-vars "${ENV_VARS[@]}"
          else
            echo "App exists — env-vars only (image + probe via atomic PATCH below)"
            source /tmp/retry-on-provisioning.sh
            retry_on_provisioning az containerapp update \
              --name ${{ steps.config.outputs.api_app }} \
              --resource-group ${{ env.RG }} \
              --set-env-vars "${ENV_VARS[@]}"
          fi

      - name: Deploy API image + startup probe (atomic)
        id: deploy_api
        # Alembic migrations + auto-seed can take 30-60s on first deploy.
        # The probe and image MUST be updated in a single PATCH so the new
        # revision starts with the correct probe. If the probe is set AFTER
        # the deploy, the old revision's probe (10s) kills the container
        # before the new probe (60s) takes effect.
        #
        # Also publishes `new_revision` as a step output — `latestRevision
        # Name` lags the PATCH by ~2 s, and on 2026-04-21 the first canary
        # run hit that race: the canary step queried it BEFORE Azure had
        # registered the new revision, so it validated (and re-promoted)
        # the PREVIOUS revision. Deploys appeared to succeed without
        # shipping any new code — a silent prod-freeze. Capturing the
        # name here lets downstream steps use it directly.
        run: |
          APP=${{ steps.config.outputs.api_app }}
          RG=${{ env.RG }}
          SUBSCRIPTION=$(az account show --query id -o tsv)
          API_URL="https://management.azure.com/subscriptions/$SUBSCRIPTION/resourceGroups/$RG/providers/Microsoft.App/containerApps/$APP?api-version=2024-03-01"
          IMAGE="${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}"

          # Snapshot the pre-deploy "latest" so we can detect when Azure
          # registers the new revision after the PATCH.
          BEFORE_REV=$(az containerapp show --name "$APP" --resource-group "$RG" \
            --query properties.latestRevisionName -o tsv 2>/dev/null || echo "none")
          echo "Pre-deploy latest revision: $BEFORE_REV"

          # Fetch the current container spec, update image + probe in one PATCH
          CURRENT=$(az rest --method GET --url "$API_URL" --query "properties.template.containers[0]" -o json)
          # revisionSuffix forces a new revision even when the image SHA
          # matches what's already deployed (eg. workflow re-runs on the
          # same commit, or recovery deploys after the previous run failed
          # mid-workflow). Without this, the PATCH is a no-op when the
          # spec is unchanged and `latestRevisionName` never advances —
          # caused tonight's recovery to stall (run 25079652656 re-run).
          PATCHED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          c = json.load(sys.stdin)
          c['image'] = '$IMAGE'
          c['probes'] = [{
            'type': 'Startup',
            'httpGet': {'path': '/ping', 'port': 8000},
            'initialDelaySeconds': 60,
            'periodSeconds': 10,
            'failureThreshold': 30,
            'timeoutSeconds': 10
          }]
          tmpl = {'revisionSuffix': 'r${{ github.run_id }}-${{ github.run_attempt }}', 'containers': [c]}
          print(json.dumps({'properties': {'template': tmpl}}))
          ")
          source /tmp/retry-on-provisioning.sh
          retry_on_provisioning az rest --method PATCH --url "$API_URL" \
            --headers "Content-Type=application/json" \
            --body "$PATCHED"

          # Poll until Azure registers a new revision (up to 60 s).
          # Without this, latestRevisionName still returns $BEFORE_REV
          # for ~2 s after the PATCH completes.
          for ATTEMPT in $(seq 1 30); do
            AFTER_REV=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query properties.latestRevisionName -o tsv 2>/dev/null || echo "none")
            if [ -n "$AFTER_REV" ] \
                && [ "$AFTER_REV" != "$BEFORE_REV" ] \
                && [ "$AFTER_REV" != "none" ]; then
              echo "New revision registered after $((ATTEMPT * 2))s: $AFTER_REV"
              echo "new_revision=$AFTER_REV" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Timed out after 60s waiting for latestRevisionName to advance past $BEFORE_REV."
          echo "The PATCH may have been a no-op (same image as currently deployed)."
          exit 1

      - name: Wait for API revision to become Healthy
        # Catches startup crashes that the deploy step would otherwise report
        # as "success". Polls the new revision's healthState (captured by
        # `Deploy API image` above, NOT re-queried — see the 2026-04-21
        # silent-prod-freeze note on that step) and waits up to 6 min for
        # the migration+startup cycle to complete.
        run: |
          APP=${{ steps.config.outputs.api_app }}
          RG=${{ env.RG }}
          DEADLINE=$(( $(date +%s) + 360 ))
          REV="${{ steps.deploy_api.outputs.new_revision }}"
          echo "Watching revision: $REV"
          # Container Apps uses several "running" states depending on KEDA
          # scale state. All of these mean "the new revision is up and
          # serving":
          #   - Running              — replicas == desired (steady state)
          #   - RunningAtMaxScale    — replicas == max-replicas (scaled out)
          #   - Scaling              — replicas adjusting up/down but already serving
          # Anything else (Activating / ActivationFailed / Deactivating) is not.
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HEALTH=$(az containerapp revision show --name "$APP" --resource-group "$RG" \
              --revision "$REV" --query properties.healthState -o tsv 2>/dev/null || echo "Unknown")
            STATE=$(az containerapp revision show --name "$APP" --resource-group "$RG" \
              --revision "$REV" --query properties.runningState -o tsv 2>/dev/null || echo "Unknown")
            echo "  health=$HEALTH state=$STATE"
            case "$STATE" in
              Running|RunningAtMaxScale|Scaling)
                if [ "$HEALTH" = "Healthy" ]; then
                  echo "Revision $REV is healthy ($STATE)."
                  exit 0
                fi
                ;;
              Stopped)
                # Scaled to zero on envs with min_replicas=0 (staging).
                # Healthy only flips true after the startup probe passes,
                # so Stopped+Healthy means "container ran + /ping passed,
                # then KEDA scaled back down" — that's a successful deploy.
                if [ "$HEALTH" = "Healthy" ]; then
                  echo "Revision $REV is healthy and scaled to zero — accepting."
                  exit 0
                fi
                ;;
              ActivationFailed)
                echo "::error::Revision $REV failed to activate. See container logs."
                az containerapp logs show --name "$APP" --resource-group "$RG" \
                  --revision "$REV" --tail 50 2>&1 || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Timed out waiting for $REV to become Healthy after 360s."
          az containerapp logs show --name "$APP" --resource-group "$RG" \
            --revision "$REV" --tail 50 2>&1 || true
          exit 1

      - name: Canary watchdog (CANARY_ENABLED only)
        # Phase 7 of application-hardening plan. Dormant until
        # `az containerapp revision set-mode --mode multiple` is run
        # on the target Container App AND `CANARY_ENABLED=1` is set on
        # the workflow secrets. See docs/runbooks/canary-activation.md.
        #
        # When active: the new revision has just passed the Healthy probe
        # above. We split traffic 90/10 (old/new) and let the watchdog
        # observe 5xx rate for 5 minutes. If the rate exceeds 2% the
        # watchdog rolls traffic back to 100% old and fails this step.
        # If the window passes cleanly the watchdog promotes to 100% new.
        if: ${{ env.CANARY_ENABLED == '1' && steps.config.outputs.env == 'prod' }}
        env:
          CANARY_ENABLED: ${{ secrets.CANARY_ENABLED }}
          APPLICATIONINSIGHTS_APP_ID: ${{ secrets.APPLICATIONINSIGHTS_APP_ID }}
          APPLICATIONINSIGHTS_API_KEY: ${{ secrets.APPLICATIONINSIGHTS_API_KEY }}
        run: |
          APP=${{ steps.config.outputs.api_app }}
          RG=${{ env.RG }}
          # Use the revision captured by Deploy API above rather than
          # re-querying latestRevisionName (which lags — see that step's
          # note). PREV_REV filters to "active, currently serving any
          # traffic, not the new one" so we don't pick a stale revision
          # that's already at 0%.
          NEW_REV="${{ steps.deploy_api.outputs.new_revision }}"
          PREV_REV=$(az containerapp revision list --name "$APP" \
            --resource-group "$RG" \
            --query "[?properties.active && properties.trafficWeight > \`0\` && name != '$NEW_REV'] | [0].name" \
            -o tsv)
          if [ -z "$PREV_REV" ]; then
            echo "No previous revision with traffic — skipping canary on first deploy."
            exit 0
          fi
          echo "Splitting traffic 90/10 between $PREV_REV and $NEW_REV"
          az containerapp ingress traffic set \
            --name "$APP" --resource-group "$RG" \
            --revision-weight "$PREV_REV=90" "$NEW_REV=10"
          python scripts/canary_watchdog.py \
            --app "$APP" --resource-group "$RG" \
            --new-revision "$NEW_REV" --previous-revision "$PREV_REV"

      - name: Finalize revisions (promote + deactivate zombies)
        # Reconciliation step that always runs. In Multiple-revision mode
        # Azure does NOT auto-promote new revisions or deactivate old ones
        # — it just lists them all as "active" with whatever traffic
        # weights they have. min_replicas=1 means each active revision
        # holds its own SQLAlchemy pool, and on 2026-04-21 we hit Postgres
        # connection exhaustion after ~5 deploys accumulated their pools.
        #
        # Two modes:
        #   Canary enabled: the watchdog above already set weights (either
        #     NEW=100 on promote or PREV=100 on rollback). We trust those
        #     weights and deactivate everything else.
        #   Canary disabled: the atomic PATCH created NEW_REV but did not
        #     reroute traffic. We MUST promote NEW_REV to 100% ourselves,
        #     then deactivate the rest. The earlier version of this step
        #     instead read "whatever is currently at 100%" and treated
        #     that as the target — which caused the 2026-04-23 outage
        #     when it picked the old revision as "serving" and deactivated
        #     the new one.
        if: always() && steps.deploy_api.outputs.new_revision != ''
        env:
          CANARY_ENABLED: ${{ secrets.CANARY_ENABLED }}
        run: |
          APP=${{ steps.config.outputs.api_app }}
          RG=${{ env.RG }}
          NEW_REV="${{ steps.deploy_api.outputs.new_revision }}"

          if [ -n "$CANARY_ENABLED" ]; then
            # Canary mode: trust whatever the watchdog set. Only used to
            # preserve rollbacks — if watchdog already shifted to 100%
            # old on rollback, we must not override back to new.
            HUNDRED_REV=$(az containerapp revision list --name "$APP" \
              --resource-group "$RG" \
              --query "[?properties.active && properties.trafficWeight == \`100\`] | [0].name" \
              -o tsv 2>/dev/null || true)
            if [ -z "$HUNDRED_REV" ]; then
              echo "Canary enabled but no revision at 100% — promoting $NEW_REV explicitly."
              az containerapp ingress traffic set \
                --name "$APP" --resource-group "$RG" \
                --revision-weight "$NEW_REV=100"
              HUNDRED_REV="$NEW_REV"
            fi
          else
            # No canary: NEW_REV just passed its healthcheck, so it's the
            # target of this deploy. Promote unconditionally.
            echo "Canary disabled; promoting $NEW_REV to 100% traffic."
            az containerapp ingress traffic set \
              --name "$APP" --resource-group "$RG" \
              --revision-weight "$NEW_REV=100"
            HUNDRED_REV="$NEW_REV"
          fi

          echo "Serving revision: $HUNDRED_REV. Deactivating zombies."
          # Deactivate every active revision except the one serving.
          # Errors are logged but don't fail the deploy — a stuck zombie
          # is bad but not bad enough to fail a green canary.
          #
          # Concurrent-deploy guard: skip revisions created within the last
          # 10 min. They almost certainly belong to a sibling deploy.yml run
          # (typical with two [skip-staging] PRs merging in close succession)
          # whose canary watchdog hasn't yet promoted them to 100%. If we
          # deactivate them here, the sibling's Finalize step will then set
          # 100% traffic on a deactivated revision → "Container App
          # Unavailable" until a human re-activates it. Triggered prod
          # outage on 2026-04-29 (#288 deactivated #289's brand-new revision
          # before #289 finished its canary window).
          CUTOFF_TS=$(($(date +%s) - 600))
          ZOMBIES=$(az containerapp revision list --name "$APP" \
            --resource-group "$RG" \
            --query "[?properties.active && name != '$HUNDRED_REV'].[name, properties.createdTime]" \
            -o tsv)
          while IFS=$'\t' read -r REV CREATED; do
            [ -z "$REV" ] && continue
            REV_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
            if [ "$REV_TS" -gt "$CUTOFF_TS" ]; then
              echo "  skipping $REV — created $CREATED (within 10 min, likely concurrent deploy)"
              continue
            fi
            echo "  deactivating $REV (created $CREATED)"
            az containerapp revision deactivate \
              --name "$APP" --resource-group "$RG" \
              --revision "$REV" 2>&1 | tail -1 || true
          done <<< "$ZOMBIES"
          echo "Done. Active revisions:"
          az containerapp revision list --name "$APP" --resource-group "$RG" \
            --query "[?properties.active].{name:name, traffic:properties.trafficWeight}" \
            -o table

      - name: Get API URL
        id: api
        run: |
          FQDN=$(az containerapp show \
            --name ${{ steps.config.outputs.api_app }} \
            --resource-group ${{ env.RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-frontend:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-frontend:${{ steps.config.outputs.env }}
          build-args: |
            API_BASE_URL=${{ steps.api.outputs.url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy frontend
        run: |
          ENV_VARS=(
            "API_BASE_URL=${{ steps.api.outputs.url }}"
            "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}"
            "AZURE_AD_CLIENT_ID=${{ secrets.FRONTEND_AZURE_AD_CLIENT_ID }}"
            "AZURE_AD_CLIENT_SECRET=${{ secrets.FRONTEND_AZURE_AD_CLIENT_SECRET }}"
            "AZURE_AD_TENANT_ID=common"
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            "AUTH_ALLOWED_DOMAINS=antire.no"
            "AUTH_ALLOWED_EMAILS=tharu281001@gmail.com"
            "NODE_ENV=production"
          )

          az containerapp create \
            --name ${{ steps.config.outputs.frontend_app }} \
            --resource-group ${{ env.RG }} \
            --environment ${{ steps.config.outputs.cae }} \
            --image ${{ env.ACR }}.azurecr.io/broker-frontend:${{ github.sha }} \
            --registry-server ${{ env.ACR }}.azurecr.io \
            --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
            --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
            --target-port 3000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 2 \
            --env-vars "${ENV_VARS[@]}" \
          2>/dev/null \
          || az containerapp update \
            --name ${{ steps.config.outputs.frontend_app }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR }}.azurecr.io/broker-frontend:${{ github.sha }} \
            --set-env-vars "${ENV_VARS[@]}"

      - name: Patch frontend NEXTAUTH_URL
        id: frontend
        # NEXTAUTH_URL must be the URL the user actually hits — it's the base
        # NextAuth uses to construct OAuth `redirect_uri`. Google/Microsoft
        # only whitelist the public domain; using the direct CA FQDN yields
        # `redirect_uri_mismatch` 400s on every login attempt (diagnosed
        # 2026-04-29). Staging keeps the direct FQDN since it has no
        # custom domain bound.
        run: |
          FQDN=$(az containerapp show \
            --name ${{ steps.config.outputs.frontend_app }} \
            --resource-group ${{ env.RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          if [ "${{ steps.config.outputs.env }}" = "prod" ]; then
            PUBLIC_URL="https://meglerai.no"
          else
            PUBLIC_URL="https://$FQDN"
          fi
          echo "url=$PUBLIC_URL" >> $GITHUB_OUTPUT

          source /tmp/retry-on-provisioning.sh
          retry_on_provisioning az containerapp update \
            --name ${{ steps.config.outputs.frontend_app }} \
            --resource-group ${{ env.RG }} \
            --set-env-vars "NEXTAUTH_URL=$PUBLIC_URL"

      - name: Restore custom domains (deploy can drop them)
        if: steps.config.outputs.env == 'prod'
        run: |
          APP=${{ steps.config.outputs.frontend_app }}
          RG=${{ env.RG }}
          CAE=${{ steps.config.outputs.cae }}
          for DOMAIN in meglerai.no www.meglerai.no; do
            EXISTING=$(az containerapp hostname list --name "$APP" --resource-group "$RG" \
              --query "[?name=='$DOMAIN'].name" -o tsv 2>/dev/null)
            if [ -z "$EXISTING" ]; then
              echo "Re-binding $DOMAIN..."
              az containerapp hostname add --name "$APP" --resource-group "$RG" --hostname "$DOMAIN" || true
              az containerapp hostname bind --name "$APP" --resource-group "$RG" \
                --hostname "$DOMAIN" --environment "$CAE" --validation-method HTTP || true
            else
              echo "$DOMAIN already bound"
            fi
          done

      # NOTE: Duplicate "Configure API startup probe" step was removed here.
      # The earlier step (line ~133) already sets the correct probe with
      # initialDelaySeconds=60. This second step was overwriting it with 10s,
      # causing the revision to fail health checks during migrations.

      - name: Smoke test — API /ping
        # In prod, hit the public URL (meglerai.no/bapi/ping) instead of
        # the direct Container Apps FQDN. The CA direct FQDN can stay
        # completely unreachable (curl 000 timeout) for 5-10+ minutes
        # after a deploy in prod — even though the new revision is
        # genuinely healthy and serving via the custom domain. The 2.5-
        # minute budget added in #268 wasn't enough; runs 25048832827
        # and 25049141406 both failed on this exact pattern.
        # The customer-facing URL is what matters and is more resilient
        # through revision swaps (Cloudflare proxies). Staging keeps
        # the direct FQDN — no public URL in front of it.
        run: |
          sleep 30
          if [ "${{ steps.config.outputs.env }}" = "prod" ]; then
            URL="https://meglerai.no/bapi/ping"
          else
            URL="${{ steps.api.outputs.url }}/ping"
          fi
          echo "Smoke target: $URL"
          curl --fail --retry 12 --retry-delay 10 --retry-all-errors "$URL"

      - name: Smoke test — frontend
        run: |
          sleep 30
          if [ "${{ steps.config.outputs.env }}" = "prod" ]; then
            URL="https://meglerai.no/"
          else
            URL="${{ steps.frontend.outputs.url }}/"
          fi
          echo "Smoke target: $URL"
          curl --fail --retry 12 --retry-delay 10 --retry-all-errors "$URL"
