name: Deploy

on:
  push:
    branches: [main, staging]

# Required for GitHub OIDC token exchange with Azure
permissions:
  id-token: write
  contents: read

env:
  RG: rg-broker-accelerator-prod
  ACR: crantireshared
  LOCATION: norwayeast
  RUNTIME_IDENTITY: /subscriptions/6c73d6c8-9e92-47f0-a3d3-ed681a1209aa/resourceGroups/rg-broker-accelerator-prod/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-runtime-broker-accelerator-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set environment config
        id: config
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "cae=cae-broker-accelerator-prod" >> $GITHUB_OUTPUT
            echo "api_app=ca-api" >> $GITHUB_OUTPUT
            echo "ui_app=ca-ui" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.DATABASE_URL }}" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "cae=cae-broker-accelerator-staging" >> $GITHUB_OUTPUT
            echo "api_app=ca-api-staging" >> $GITHUB_OUTPUT
            echo "ui_app=ca-ui-staging" >> $GITHUB_OUTPUT
            echo "db_url=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-api:${{ steps.config.outputs.env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-ui:${{ steps.config.outputs.env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure Container Apps Environment
        run: |
          az containerapp env show \
            --name ${{ steps.config.outputs.cae }} \
            --resource-group ${{ env.RG }} \
            --output none 2>/dev/null \
          || az containerapp env create \
            --name ${{ steps.config.outputs.cae }} \
            --resource-group ${{ env.RG }} \
            --location ${{ env.LOCATION }}

      - name: Deploy API
        run: |
          az containerapp create \
            --name ${{ steps.config.outputs.api_app }} \
            --resource-group ${{ env.RG }} \
            --environment ${{ steps.config.outputs.cae }} \
            --image ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }} \
            --registry-server ${{ env.ACR }}.azurecr.io \
            --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
            --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --env-vars \
              "DATABASE_URL=${{ steps.config.outputs.db_url }}" \
              "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
              "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}" \
              "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_CHAT_DEPLOYMENT=gpt-4o" \
              "AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}" \
              "AZURE_DOCUMENT_INTELLIGENCE_KEY=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}" \
              "AZURE_BLOB_ENDPOINT=${{ secrets.AZURE_BLOB_ENDPOINT }}" \
              "AZURE_SEARCH_ENDPOINT=${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
              "AZURE_SEARCH_API_KEY=${{ secrets.AZURE_SEARCH_API_KEY }}" \
              "AZURE_SEARCH_INDEX_NAME=company-chunks" \
              "AZURE_COMMUNICATION_CONNECTION_STRING=${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}" \
              "AZURE_VIDEO_CONTAINER=transksrt" \
              "AZURE_CLIENT_ID=b7cb534e-d7a3-4028-8f72-50bfd7f99f2b" \
          2>/dev/null \
          || az containerapp update \
            --name ${{ steps.config.outputs.api_app }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}

      - name: Get API URL
        id: api
        run: |
          FQDN=$(az containerapp show \
            --name ${{ steps.config.outputs.api_app }} \
            --resource-group ${{ env.RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Deploy UI
        run: |
          az containerapp create \
            --name ${{ steps.config.outputs.ui_app }} \
            --resource-group ${{ env.RG }} \
            --environment ${{ steps.config.outputs.cae }} \
            --image ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }} \
            --registry-server ${{ env.ACR }}.azurecr.io \
            --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
            --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
            --target-port 8501 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 2 \
            --env-vars "API_BASE_URL=${{ steps.api.outputs.url }}" \
          2>/dev/null \
          || az containerapp update \
            --name ${{ steps.config.outputs.ui_app }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }}

      - name: Smoke test — API /ping
        run: curl --fail --retry 5 --retry-delay 5 "${{ steps.api.outputs.url }}/ping"
