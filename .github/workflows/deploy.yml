name: Deploy

on:
  push:
    branches: [main]

# Required for GitHub OIDC token exchange with Azure
permissions:
  id-token: write
  contents: read

env:
  RG: rg-broker-accelerator-prod
  ACR: crantireshared
  CAE: cae-broker-accelerator-prod
  LOCATION: norwayeast
  RUNTIME_IDENTITY: /subscriptions/6c73d6c8-9e92-47f0-a3d3-ed681a1209aa/resourceGroups/rg-broker-accelerator-prod/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-runtime-broker-accelerator-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }}
            ${{ env.ACR }}.azurecr.io/broker-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure Container Apps Environment
        run: |
          az containerapp env show \
            --name ${{ env.CAE }} \
            --resource-group ${{ env.RG }} \
            --output none 2>/dev/null \
          || az containerapp env create \
            --name ${{ env.CAE }} \
            --resource-group ${{ env.RG }} \
            --location ${{ env.LOCATION }}

      - name: Deploy API
        run: |
          az containerapp create \
            --name ca-api \
            --resource-group ${{ env.RG }} \
            --environment ${{ env.CAE }} \
            --image ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }} \
            --registry-server ${{ env.ACR }}.azurecr.io \
            --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
            --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
              "GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}" \
              "GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}" \
          2>/dev/null \
          || az containerapp update \
            --name ca-api \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR }}.azurecr.io/broker-api:${{ github.sha }}

      - name: Get API URL
        id: api
        run: |
          FQDN=$(az containerapp show \
            --name ca-api \
            --resource-group ${{ env.RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Deploy UI
        run: |
          az containerapp create \
            --name ca-ui \
            --resource-group ${{ env.RG }} \
            --environment ${{ env.CAE }} \
            --image ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }} \
            --registry-server ${{ env.ACR }}.azurecr.io \
            --registry-identity "${{ env.RUNTIME_IDENTITY }}" \
            --user-assigned "${{ env.RUNTIME_IDENTITY }}" \
            --target-port 8501 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 2 \
            --env-vars "API_BASE_URL=${{ steps.api.outputs.url }}" \
          2>/dev/null \
          || az containerapp update \
            --name ca-ui \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR }}.azurecr.io/broker-ui:${{ github.sha }}

      - name: Smoke test — API /ping
        run: curl --fail --retry 5 --retry-delay 5 "${{ steps.api.outputs.url }}/ping"
