name: Daily Activity Reminders

on:
  schedule:
    # 06:30 UTC every weekday (08:30 Norwegian summer time)
    # Fires 30 minutes before the renewal reminder so both arrive in the same morning window
    - cron: "30 6 * * 1-5"
  workflow_dispatch:  # allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send activity due-date reminders
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ vars.API_BASE_URL }}/admin/activity-reminders" \
            -H "Content-Type: application/json"
