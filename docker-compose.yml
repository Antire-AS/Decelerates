services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: broker-postgres
    environment:
      POSTGRES_USER: brokeruser
      POSTGRES_PASSWORD: brokerpass
      POSTGRES_DB: brokerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokeruser -d brokerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: broker-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://brokeruser:brokerpass@postgres:5432/brokerdb
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js frontend (replaced the legacy Streamlit ui — deleted 2026-04-08)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        API_BASE_URL: http://api:8000
    container_name: broker-frontend
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
